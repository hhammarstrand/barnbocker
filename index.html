<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fifi the Fox's Friendship Adventure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .page-indicator {
      font-size: 14px;
      color: #888;
    }
    .book-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }
    .page {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      max-width: 100%;
      width: 100%;
    }
    .page-image {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .page-text {
      padding: 24px 20px;
      color: #333;
      font-size: 20px;
      line-height: 1.6;
      text-align: center;
      min-height: 120px;
    }
    .nav-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 20px;
      background: #16213e;
    }
    .nav-btn {
      background: #6366f1;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      min-width: 120px;
    }
    .nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .nav-btn:active:not(:disabled) {
      transform: scale(0.97);
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="bookTitle">Loading...</h1>
    <span class="page-indicator" id="pageIndicator">- / -</span>
  </div>
  
  <div class="book-container">
    <div class="page" id="pageContainer">
      <div class="loading">Loading book...</div>
    </div>
  </div>
  
  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn" onclick="prevPage()">Previous</button>
    <button class="nav-btn" id="nextBtn" onclick="nextPage()">Next</button>
  </div>

  <script>
    const bookPath = 'books/fifi-the-fox-adventure';
    let bookData = null;
    let currentPage = 0;

    async function loadBook() {
      try {
        const res = await fetch(`${bookPath}/book.json`);
        bookData = await res.json();
        document.getElementById('bookTitle').textContent = bookData.title;
        renderPage(0);
      } catch (e) {
        document.getElementById('pageContainer').innerHTML = 
          '<div class="loading">Error loading book. Make sure you are running on a local server.</div>';
      }
    }

    function renderPage(index) {
      const page = bookData.pages[index];
      const imgPath = page.image ? `${bookPath}/${page.image}` : '';
      const coverPath = index === 0 && page.image === null ? `${bookPath}/cover.png` : '';
      
      const imgSrc = index === 0 && page.image === null ? coverPath : imgPath;
      
      document.getElementById('pageContainer').innerHTML = `
        <img class="page-image" src="${imgSrc}" alt="Page ${index + 1}" 
             onerror="this.style.display='none'">
        <div class="page-text">${page.text}</div>
      `;
      document.getElementById('pageIndicator').textContent = `${index + 1} / ${bookData.pages.length}`;
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === bookData.pages.length - 1;
    }

    function prevPage() {
      if (currentPage > 0) {
        currentPage--;
        renderPage(currentPage);
      }
    }

    function nextPage() {
      if (currentPage < bookData.pages.length - 1) {
        currentPage++;
        renderPage(currentPage);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prevPage();
      if (e.key === 'ArrowRight') nextPage();
    });

    loadBook();
  </script>
</body>
</html>
