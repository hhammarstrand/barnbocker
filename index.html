<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Barnböcker - Children's Books</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      text-align: center;
      padding: 40px 20px;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      color: #888;
      font-size: 16px;
    }
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 0;
    }
    .book-card {
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.3);
    }
    .book-card:active {
      transform: scale(0.98);
    }
    .book-cover {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .book-info {
      padding: 20px;
    }
    .book-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .book-description {
      font-size: 14px;
      color: #aaa;
      line-height: 1.4;
    }
    .book-meta {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 Barnböcker</h1>
    <p>Välj en bok att läsa</p>
  </div>
  
  <div class="book-grid">
    <a class="book-card" href="book-fifi.html">
      <img class="book-cover" src="books/fifi-the-fox-adventure/cover.png" alt="Cover">
      <div class="book-info">
        <div class="book-title">Fifi the Fox's Friendship Adventure</div>
        <div class="book-description">Join Fifi the Fox on an exciting friendship adventure!</div>
        <div class="book-meta">6 pages • Ages 1-5</div>
      </div>
    </a>
  </div>
</body>
</html>
